<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOA · Funded ROI Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080c;--bg2:#0f0f15;--bg3:#15151e;
  --brd:#1e1e2c;--brd2:#2a2a3d;
  --t:#e4e4ed;--t2:#8585a0;--t3:#4e4e68;
  --g:#00e676;--gbg:rgba(0,230,118,0.08);--gb:rgba(0,230,118,0.2);
  --r:#ff3d57;--rbg:rgba(255,61,87,0.08);--rb:rgba(255,61,87,0.2);
  --a:#ffab00;--cy:#18ffff;--bl:#448aff;
  --mono:'Montserrat',sans-serif;--sans:'Montserrat',sans-serif;
  --rad:14px;--rad2:10px;
  /* 21st.dev glow tokens */
  --glow-g:rgba(0,230,118,0.35);--glow-r:rgba(255,61,87,0.3);--glow-bl:rgba(68,138,255,0.3);
  --glass-bg:rgba(15,15,21,0.55);--glass-brd:rgba(255,255,255,0.06);
}
html{background:var(--bg)}
body{font-family:var(--sans);background:var(--bg);color:var(--t);min-height:100vh;overflow-x:hidden}

/* ═══════════ 21st.dev: ANIMATED GRADIENT MESH BACKGROUND ═══════════ */
.gradient-mesh{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.gradient-mesh .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.4;will-change:transform}
.gradient-mesh .orb-1{width:600px;height:600px;background:radial-gradient(circle,rgba(0,230,118,0.12),transparent 70%);top:-10%;left:-5%;animation:orbFloat1 25s ease-in-out infinite}
.gradient-mesh .orb-2{width:500px;height:500px;background:radial-gradient(circle,rgba(68,138,255,0.08),transparent 70%);top:40%;right:-10%;animation:orbFloat2 30s ease-in-out infinite}
.gradient-mesh .orb-3{width:400px;height:400px;background:radial-gradient(circle,rgba(255,61,87,0.06),transparent 70%);bottom:-5%;left:30%;animation:orbFloat3 20s ease-in-out infinite}
.gradient-mesh .orb-4{width:350px;height:350px;background:radial-gradient(circle,rgba(24,255,255,0.05),transparent 70%);top:20%;left:50%;animation:orbFloat4 35s ease-in-out infinite}
@keyframes orbFloat1{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(80px,60px) scale(1.1)}50%{transform:translate(30px,120px) scale(0.95)}75%{transform:translate(-40px,40px) scale(1.05)}}
@keyframes orbFloat2{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-60px,-80px) scale(1.08)}66%{transform:translate(40px,50px) scale(0.92)}}
@keyframes orbFloat3{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,-60px) scale(1.1)}}
@keyframes orbFloat4{0%,100%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(-80px,60px) rotate(180deg)}}

/* ═══════════ 21st.dev: NOISE / GRAIN TEXTURE OVERLAY ═══════════ */
.noise-overlay{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.035;mix-blend-mode:overlay}
.noise-overlay::after{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");background-repeat:repeat;background-size:128px 128px;animation:noiseShift 0.15s steps(2) infinite}
@keyframes noiseShift{0%{transform:translate(0,0)}100%{transform:translate(-10px,-10px)}}

/* ═══════════ 21st.dev: DOT GRID PATTERN ═══════════ */
.dot-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(rgba(255,255,255,0.03) 1px,transparent 1px);background-size:28px 28px}

.app{max-width:1280px;margin:0 auto;padding:24px 24px 80px;position:relative;z-index:2}

/* ═══════════ HEADER ═══════════ */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.hdr h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#e4e4ed 0%,#8585a0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr p{font-size:13px;color:var(--t3)}
.hdr-btns{display:flex;gap:8px;flex-wrap:wrap}

/* ═══════════ TABS ═══════════ */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--brd);margin-bottom:28px}
.tab{padding:10px 20px;font-size:13px;font-weight:500;color:var(--t3);cursor:pointer;border:none;background:none;font-family:var(--sans);border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px;position:relative}
.tab:hover{color:var(--t2)}
.tab.on{color:var(--g);border-bottom-color:var(--g)}
.tab.on::after{content:'';position:absolute;bottom:-1px;left:20%;right:20%;height:6px;background:var(--g);filter:blur(8px);opacity:.5}
.tc{display:none}.tc.on{display:block}

/* ═══════════ 21st.dev: BUTTONS WITH GLOW ═══════════ */
.btn{padding:8px 16px;border-radius:var(--rad2);border:1px solid var(--brd2);background:var(--glass-bg);backdrop-filter:blur(12px);color:var(--t);font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;pointer-events:none;background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(255,255,255,0.06),transparent 60%)}
.btn:hover::before{opacity:1}
.btn:hover{border-color:rgba(255,255,255,0.1);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-g{background:rgba(0,230,118,0.08);border-color:var(--gb);color:var(--g);box-shadow:0 0 20px rgba(0,230,118,0.08)}
.btn-g:hover{box-shadow:0 0 30px rgba(0,230,118,0.15);border-color:rgba(0,230,118,0.4)}
.btn-r{background:var(--rbg);border-color:var(--rb);color:var(--r)}
.btn-e{border-color:var(--rb);color:var(--r)}
.btn-e:hover{box-shadow:0 0 20px rgba(255,61,87,0.1);background:var(--rbg)}
.btn-sm{padding:4px 10px;font-size:11px}

/* ═══════════ 21st.dev: STAT CARDS WITH ANIMATED GRADIENT BORDER ═══════════ */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.sc{
  background:var(--glass-bg);
  backdrop-filter:blur(16px);
  border:1px solid var(--glass-brd);
  border-radius:var(--rad);
  padding:20px 22px;
  position:relative;
  overflow:hidden;
  transition:all .3s cubic-bezier(.4,0,.2,1);
}
/* Animated gradient border shimmer on hover */
.sc::before{
  content:'';position:absolute;inset:-1px;border-radius:var(--rad);
  background:conic-gradient(from var(--border-angle,0deg),transparent 40%,var(--g) 50%,transparent 60%);
  opacity:0;transition:opacity .4s;z-index:-1;
}
.sc:hover::before{opacity:.3}
.sc:hover{border-color:transparent;transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.3)}
/* Spotlight gradient follows mouse */
.sc::after{
  content:'';position:absolute;inset:0;border-radius:var(--rad);
  background:radial-gradient(300px circle at var(--mx,50%) var(--my,50%),rgba(255,255,255,0.03),transparent 60%);
  pointer-events:none;opacity:0;transition:opacity .3s;
}
.sc:hover::after{opacity:1}
.sc-label{font-size:12px;color:var(--t3);margin-bottom:8px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.sc-val{font-family:var(--mono);font-weight:500;font-size:28px;line-height:1}
.sc-sub{font-size:12px;color:var(--t3);margin-top:4px;font-family:var(--mono)}

/* ═══════════ 21st.dev: GLASSMORPHISM CARDS ═══════════ */
.chart-row{display:grid;grid-template-columns:1fr 380px;gap:16px;margin-bottom:24px}
.card{
  background:var(--glass-bg);
  backdrop-filter:blur(16px);
  border:1px solid var(--glass-brd);
  border-radius:var(--rad);
  padding:24px;
  position:relative;
  overflow:hidden;
  transition:border-color .3s;
}
.card:hover{border-color:rgba(255,255,255,0.08)}
/* Subtle inner glow at top */
.card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent)}
.card-title{font-size:16px;font-weight:700}.card-sub{font-size:12px;color:var(--t3);margin-top:2px}

/* ═══════════ CHART ═══════════ */
.chart-svg{width:100%;overflow:visible}
.chart-line{fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.chart-area{opacity:.12}
.chart-dot{r:3;stroke-width:2}

/* Sub tabs */
.stabs{display:flex;gap:4px;border-bottom:1px solid var(--brd);margin-bottom:16px}
.stab{padding:6px 14px;font-size:12px;cursor:pointer;border:none;background:none;color:var(--t3);border-bottom:2px solid transparent;font-family:var(--sans);transition:all .2s}
.stab.on{color:var(--g);border-bottom-color:var(--g)}
.stab:hover{color:var(--t2)}

/* Range btns */
.rbtn{padding:6px 12px;border-radius:8px;border:1px solid var(--brd2);background:var(--bg3);color:var(--t2);font-size:11px;font-family:var(--mono);cursor:pointer;font-weight:500;transition:all .2s}
.rbtn.on{border-color:var(--g);background:var(--gbg);color:var(--g);box-shadow:0 0 12px rgba(0,230,118,0.1)}
.rbtn:hover{border-color:rgba(255,255,255,0.1)}

/* ═══════════ 21st.dev: MONTHLY CARDS WITH GLOW ═══════════ */
.mc{
  background:var(--glass-bg);
  backdrop-filter:blur(12px);
  border:1px solid var(--glass-brd);
  border-radius:var(--rad2);
  padding:16px 20px;
  margin-bottom:8px;
  position:relative;
  overflow:hidden;
  transition:all .3s;
}
.mc:hover{border-color:rgba(255,255,255,0.08);transform:translateX(4px)}
/* Spotlight on hover */
.mc::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(400px circle at var(--mx,50%) var(--my,50%),rgba(255,255,255,0.02),transparent 60%);
  pointer-events:none;opacity:0;transition:opacity .3s;
}
.mc:hover::after{opacity:1}
.mc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mc-name{font-weight:600;font-size:14px}
.mc-profit{font-family:var(--mono);font-weight:500;font-size:18px}
.mc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.mc-cell{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.03);border-radius:8px;padding:8px 12px;text-align:center;transition:all .2s}
.mc-cell:hover{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.06)}
.mc-cv{font-family:var(--mono);font-weight:500;font-size:14px}
.mc-cl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-top:2px}
.mc-bar{height:4px;background:rgba(255,255,255,.02);border-radius:2px;margin-top:10px;overflow:hidden;display:flex;gap:1px}
.mc-cum{text-align:right;font-size:11px;color:var(--t3);font-family:var(--mono);margin-top:6px}

/* ═══════════ DONUT LEGEND ═══════════ */
.dl{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:6px 8px;border-radius:6px;transition:background .2s}
.dl:hover{background:rgba(255,255,255,0.02)}
.dl-dot{width:8px;height:8px;border-radius:4px;flex-shrink:0;box-shadow:0 0 6px currentColor}

/* ═══════════ 21st.dev: TRANSACTION ITEMS WITH SPOTLIGHT ═══════════ */
.ti{
  display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr auto;align-items:center;gap:12px;
  padding:14px 20px;
  background:var(--glass-bg);
  backdrop-filter:blur(12px);
  border:1px solid var(--glass-brd);
  border-radius:var(--rad2);
  margin-bottom:6px;font-size:13px;
  position:relative;overflow:hidden;
  transition:all .3s;
}
.ti:hover{border-color:rgba(255,255,255,0.08);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.2)}
.ti::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(300px circle at var(--mx,50%) var(--my,50%),rgba(255,255,255,0.02),transparent 60%);
  pointer-events:none;opacity:0;transition:opacity .3s;
}
.ti:hover::after{opacity:1}
.ti-lbl{font-family:var(--mono);font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.ti-val{font-family:var(--mono);font-weight:500}

/* ═══════════ 21st.dev: ACCOUNT CARDS WITH GLASSMORPHISM ═══════════ */
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.ac{
  background:var(--glass-bg);
  backdrop-filter:blur(16px);
  border:1px solid var(--glass-brd);
  border-radius:var(--rad);
  padding:18px 20px;
  position:relative;
  overflow:hidden;
  transition:all .3s cubic-bezier(.4,0,.2,1);
}
.ac:hover{border-color:rgba(255,255,255,0.08);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.25)}
/* Spotlight */
.ac::after{
  content:'';position:absolute;inset:0;border-radius:var(--rad);
  background:radial-gradient(250px circle at var(--mx,50%) var(--my,50%),rgba(255,255,255,0.03),transparent 60%);
  pointer-events:none;opacity:0;transition:opacity .3s;
}
.ac:hover::after{opacity:1}
.ac-name{font-weight:600;font-size:14px}
.ac-badge{display:inline-block;padding:3px 8px;border-radius:12px;font-size:10px;font-weight:600;font-family:var(--mono);text-transform:uppercase;margin-left:6px;letter-spacing:.5px}
.ac-firm{font-size:12px;color:var(--t3);font-family:var(--mono);margin-top:2px}
.ac-meta{display:flex;gap:20px;margin-top:12px;font-size:12px;font-family:var(--mono)}
.ac-mv{font-weight:500}.ac-ml{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.ac-del{position:absolute;top:12px;right:12px;display:flex;gap:4px}

/* ═══════════ 21st.dev: GLASSMORPHISM MODALS ═══════════ */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(12px);z-index:200;justify-content:center;align-items:center}
.ov.on{display:flex}
.md{
  background:rgba(15,15,21,0.85);
  backdrop-filter:blur(24px);
  border:1px solid var(--glass-brd);
  border-radius:var(--rad);
  padding:28px;width:90%;max-width:480px;max-height:90vh;overflow-y:auto;
  box-shadow:0 24px 64px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,0.03);
  position:relative;
  animation:modalIn .3s cubic-bezier(.4,0,.2,1);
}
/* Top accent line */
.md::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--g),transparent);opacity:.5}
@keyframes modalIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.md-title{font-size:16px;font-weight:700;margin-bottom:20px;background:linear-gradient(135deg,#e4e4ed,#8585a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.fd{margin-bottom:14px}
.fd-l{display:block;font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
.fd-i,.fd-s{width:100%;padding:10px 12px;background:rgba(8,8,12,0.6);border:1px solid var(--brd);border-radius:var(--rad2);color:var(--t);font-family:var(--mono);font-size:13px;outline:none;transition:all .25s}
.fd-i:focus,.fd-s:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(0,230,118,0.08)}
.fd-r{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.md-f{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.roi-badge{padding:3px 8px;border-radius:6px;font-family:var(--mono);font-weight:500;font-size:12px}
.sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sec-title{font-size:13px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}

/* ═══════════ 21st.dev: ANIMATED COUNTER NUMBERS ═══════════ */
.counter{display:inline-block;font-variant-numeric:tabular-nums}

/* ═══════════ 21st.dev: GLOW TEXT ═══════════ */
.glow-green{text-shadow:0 0 20px rgba(0,230,118,0.3)}
.glow-red{text-shadow:0 0 20px rgba(255,61,87,0.3)}
.glow-blue{text-shadow:0 0 20px rgba(68,138,255,0.3)}

/* ═══════════ 21st.dev: SHIMMER EMPTY STATE ═══════════ */
.empty{text-align:center;padding:40px;color:var(--t3);font-size:13px;position:relative}
.empty::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 25%,rgba(255,255,255,0.02) 50%,transparent 75%);
  background-size:200% 100%;
  animation:shimmer 2s ease-in-out infinite;
  border-radius:var(--rad);pointer-events:none;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ═══════════ 21st.dev: ROTATING GRADIENT BORDER FOR HERO STAT ═══════════ */
@property --border-angle{syntax:'<angle>';initial-value:0deg;inherits:false}
@keyframes rotateBorder{to{--border-angle:360deg}}
.sc-hero{animation:rotateBorder 4s linear infinite}
.sc-hero::before{
  background:conic-gradient(from var(--border-angle),transparent 30%,var(--g) 50%,transparent 70%);
  opacity:.4 !important;
}

/* ═══════════ 21st.dev: STAGGERED ENTRANCE ANIMATIONS ═══════════ */
@keyframes springUp{
  0%{opacity:0;transform:translateY(20px) scale(.97)}
  60%{transform:translateY(-3px) scale(1.005)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes fadeSlideRight{
  0%{opacity:0;transform:translateX(-12px)}
  100%{opacity:1;transform:translateX(0)}
}
.spring-up{animation:springUp .5s cubic-bezier(.4,0,.2,1) both}
.mc,.ti,.ac{animation:springUp .4s cubic-bezier(.4,0,.2,1) both}

/* ═══════════ 21st.dev: PULSE DOT INDICATORS ═══════════ */
.pulse-dot{width:6px;height:6px;border-radius:3px;position:relative}
.pulse-dot::after{content:'';position:absolute;inset:-3px;border-radius:50%;background:inherit;opacity:.3;animation:pulseDot 2s ease-in-out infinite}
@keyframes pulseDot{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.8);opacity:0}}

/* ═══════════ 21st.dev: ANIMATED PROGRESS BAR ═══════════ */
.progress-animated{position:relative;overflow:hidden}
.progress-animated::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
  animation:progressShine 2s ease-in-out infinite;
}
@keyframes progressShine{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* ═══════════ SCROLLBAR ═══════════ */
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--brd2)}

/* ═══════════ RESPONSIVE ═══════════ */
@media(max-width:900px){.stats{grid-template-columns:1fr 1fr}.chart-row{grid-template-columns:1fr}}
@media(max-width:640px){.stats{grid-template-columns:1fr}.ti{grid-template-columns:1fr 1fr}.ag{grid-template-columns:1fr}}

/* ═══════════ 21st.dev: TOOLTIP ═══════════ */
[data-tip]{position:relative}
[data-tip]:hover::after{
  content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
  background:rgba(15,15,21,0.9);backdrop-filter:blur(8px);border:1px solid var(--glass-brd);
  color:var(--t);font-size:11px;font-family:var(--mono);padding:4px 10px;border-radius:6px;white-space:nowrap;z-index:100;
  animation:tipIn .15s ease;pointer-events:none;
}
@keyframes tipIn{from{opacity:0;transform:translateX(-50%) translateY(4px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ═══════════ TIMEFRAME FILTER BAR ═══════════ */
.tf-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px;padding:12px 16px;background:var(--glass-bg);backdrop-filter:blur(12px);border:1px solid var(--glass-brd);border-radius:var(--rad);position:relative}
.tf-bar::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent)}
.tf-btns{display:flex;gap:4px}
.tf-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--brd2);background:transparent;color:var(--t3);font-size:12px;font-family:var(--sans);font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.02em}
.tf-btn:hover{color:var(--t2);border-color:rgba(255,255,255,0.1)}
.tf-btn.on{background:var(--gbg);border-color:var(--gb);color:var(--g);box-shadow:0 0 12px rgba(0,230,118,0.08)}
.tf-custom{display:flex;align-items:center;gap:8px;animation:springUp .3s ease both}
.tf-date{width:140px !important;padding:6px 10px !important;font-size:12px !important}
.tf-label{margin-left:auto;font-size:11px;color:var(--t3);font-family:var(--sans)}

/* ═══════════ LOGIN SCREEN ═══════════ */
.login-ov{position:fixed;inset:0;z-index:300;background:var(--bg);display:flex;align-items:center;justify-content:center}
.login-ov.hidden{display:none}
.login-box{background:var(--glass-bg);backdrop-filter:blur(24px);border:1px solid var(--glass-brd);border-radius:var(--rad);padding:36px 32px;width:90%;max-width:380px;text-align:center;position:relative;animation:modalIn .4s ease;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.login-box::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--g),transparent);opacity:.5}
.login-box h2{font-size:20px;font-weight:700;margin-bottom:4px}
.login-box p{font-size:12px;color:var(--t3);margin-bottom:20px}
.login-box input{width:100%;padding:12px 14px;background:rgba(8,8,12,0.6);border:1px solid var(--brd);border-radius:var(--rad2);color:var(--t);font-family:var(--sans);font-size:14px;text-align:center;outline:none;transition:all .25s;letter-spacing:2px}
.login-box input:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(0,230,118,0.08)}
.login-box button{width:100%;padding:12px;border:none;border-radius:var(--rad2);background:var(--g);color:#000;font-weight:700;font-size:14px;cursor:pointer;margin-top:12px;transition:all .2s}
.login-box button:hover{background:#00c864;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,230,118,0.3)}
.login-error{color:var(--r);font-size:12px;margin-top:10px;min-height:18px}
.login-spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,230,118,0.3);border-top-color:var(--g);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══════════ 21st.dev: FOCUS RING ═══════════ */
:focus-visible{outline:2px solid var(--g);outline-offset:2px;border-radius:4px}
</style>
</head>
<body>

<!-- Login screen -->
<div class="login-ov" id="loginScreen">
  <div class="login-box">
    <h2>Funded Tracker</h2>
    <p>Enter your password to access your data</p>
    <input type="password" id="loginPw" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Unlock</button>
    <div class="login-error" id="loginErr"></div>
  </div>
</div>

<!-- 21st.dev: Animated gradient mesh background -->
<div class="gradient-mesh">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
</div>
<!-- 21st.dev: Dot grid pattern -->
<div class="dot-grid"></div>
<!-- 21st.dev: Noise grain overlay -->
<div class="noise-overlay"></div>

<div class="app">
  <div class="hdr">
    <div><h1>Welcome back, Sean</h1><p>Here's an overview of your prop firm activity</p></div>
    <div class="hdr-btns">
      <button class="btn" onclick="exportAll()" data-tip="Download JSON backup">Export</button>
      <button class="btn" onclick="importAll()" data-tip="Restore from backup">Import</button>
      <button class="btn btn-g" onclick="openM('payout')">+ Log Payout</button>
      <button class="btn btn-e" onclick="openM('expense')">+ Log Expense</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" data-t="dashboard" onclick="switchTab('dashboard',this)">Dashboard</button>
    <button class="tab" data-t="accounts" onclick="switchTab('accounts',this)">Accounts</button>
    <button class="tab" data-t="transactions" onclick="switchTab('transactions',this)">Transactions</button>
  </div>

  <!-- Timeframe filter -->
  <div class="tf-bar" id="tfBar">
    <div class="tf-btns">
      <button class="tf-btn on" onclick="setTf('all',this)">All Time</button>
      <button class="tf-btn" onclick="setTf('1w',this)">1W</button>
      <button class="tf-btn" onclick="setTf('1m',this)">1M</button>
      <button class="tf-btn" onclick="setTf('3m',this)">3M</button>
      <button class="tf-btn" onclick="setTf('6m',this)">6M</button>
      <button class="tf-btn" onclick="setTf('1y',this)">1Y</button>
      <button class="tf-btn" onclick="setTf('custom',this)">Custom</button>
    </div>
    <div class="tf-custom" id="tfCustom" style="display:none">
      <input type="date" class="fd-i tf-date" id="tfFrom" onchange="applyCustomTf()">
      <span style="color:var(--t3);font-size:12px">to</span>
      <input type="date" class="fd-i tf-date" id="tfTo" onchange="applyCustomTf()">
    </div>
    <div class="tf-label" id="tfLabel">Showing all time</div>
  </div>

  <div class="tc on" id="tc-dashboard">
    <div class="stats" id="statCards"></div>
    <div class="chart-row">
      <div class="card" id="chartCard"></div>
      <div class="card" id="breakdownCard"></div>
    </div>
    <div class="card"><div style="font-size:16px;font-weight:700;margin-bottom:16px">Monthly Breakdown</div><div id="monthlyList"></div></div>
  </div>

  <div class="tc" id="tc-accounts">
    <div class="sec-head"><span class="sec-title">My Accounts</span><button class="btn btn-g" onclick="openM('account')">+ Add Account</button></div>
    <div class="ag" id="acctActive"></div>
    <div id="blownSec" style="display:none"><div class="sec-head" style="margin-top:32px"><span class="sec-title" style="color:var(--r)">Blown / Inactive</span></div><div class="ag" id="acctBlown"></div></div>
  </div>

  <div class="tc" id="tc-transactions">
    <div class="sec-head"><span class="sec-title">All Transactions</span></div>
    <div id="txList"></div>
  </div>
</div>

<!-- Modals -->
<div class="ov" id="m-payout"><div class="md"><div class="md-title">Log Payout</div>
  <div class="fd-r"><div class="fd"><label class="fd-l">Amount ($)</label><input class="fd-i" id="pAmt" type="number" step="0.01" placeholder="e.g. 5000"></div><div class="fd"><label class="fd-l">Date</label><input class="fd-i" id="pDate" type="date"></div></div>
  <div class="fd-r"><div class="fd"><label class="fd-l">Prop Firm</label><select class="fd-s" id="pFirm"></select></div><div class="fd"><label class="fd-l">Account Name</label><input class="fd-i" id="pAcct" placeholder="e.g. TPT #1"></div></div>
  <div class="fd"><label class="fd-l">Notes</label><input class="fd-i" id="pNotes" placeholder="Optional..."></div>
  <div class="md-f"><button class="btn" onclick="closeM('payout')">Cancel</button><button class="btn btn-g" onclick="savePayout()">Save</button></div>
</div></div>

<div class="ov" id="m-expense"><div class="md"><div class="md-title">Log Expense</div>
  <div class="fd-r"><div class="fd"><label class="fd-l">Amount ($)</label><input class="fd-i" id="eAmt" type="number" step="0.01" placeholder="e.g. 100"></div><div class="fd"><label class="fd-l">Date</label><input class="fd-i" id="eDate" type="date"></div></div>
  <div class="fd-r"><div class="fd"><label class="fd-l">Type</label><select class="fd-s" id="eType"><option value="eval">Eval Fee</option><option value="activation">Activation</option><option value="reset">Reset</option><option value="data">Data/Platform</option><option value="other">Other</option></select></div><div class="fd"><label class="fd-l">Prop Firm</label><select class="fd-s" id="eFirm"></select></div></div>
  <div class="fd"><label class="fd-l">Notes</label><input class="fd-i" id="eNotes" placeholder="e.g. 50K eval with code SOA"></div>
  <div class="md-f"><button class="btn" onclick="closeM('expense')">Cancel</button><button class="btn btn-g" onclick="saveExpense()">Save</button></div>
</div></div>

<div class="ov" id="m-account"><div class="md"><div class="md-title" id="aMdTitle">Add Account</div>
  <input type="hidden" id="aEditId">
  <div class="fd-r"><div class="fd"><label class="fd-l">Account Name</label><input class="fd-i" id="aName" placeholder="e.g. TPT #1"></div><div class="fd"><label class="fd-l">Prop Firm</label><select class="fd-s" id="aFirm"></select></div></div>
  <div class="fd-r"><div class="fd"><label class="fd-l">Account Size</label><select class="fd-s" id="aSize"><option value="50000">$50,000</option><option value="100000">$100,000</option><option value="150000">$150,000</option></select></div><div class="fd"><label class="fd-l">Status</label><select class="fd-s" id="aStatus"><option value="eval">Evaluation</option><option value="passed">Passed</option><option value="funded">Funded</option><option value="blown">Blown</option></select></div></div>
  <div class="fd-r"><div class="fd"><label class="fd-l">Start Date</label><input class="fd-i" id="aDate" type="date"></div><div class="fd"><label class="fd-l">Notes</label><input class="fd-i" id="aNotes" placeholder="Optional..."></div></div>
  <div class="md-f"><button class="btn" onclick="closeM('account')">Cancel</button><button class="btn btn-g" onclick="saveAccount()">Save</button></div>
</div></div>

<script>
const FIRMS=['TPT','TopStep','MyFundedFutures','Tradify','Apex','Other'];
const FF={TPT:'Take Profit Trader',TopStep:'TopStep',MyFundedFutures:'My Funded Futures',Tradify:'Tradify',Apex:'Apex',Other:'Other'};
const ET={eval:'Eval Fee',activation:'Activation',reset:'Reset',data:'Data/Platform',other:'Other'};
const SL={eval:'Evaluation',passed:'Passed',funded:'Funded',blown:'Blown'};
const SC={eval:'#448aff',passed:'#18ffff',funded:'#00e676',blown:'#ff3d57'};
const DC=['#00e676','#448aff','#ffab00','#ff3d57','#b388ff','#18ffff','#ff6e40','#69f0ae'];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const fmt=n=>{if(!n&&n!==0)return'$0';const a=Math.abs(n),s=a>=1000?a.toLocaleString('en-US',{maximumFractionDigits:2}):a.toFixed(a%1?2:0);return(n<0?'-$':'$')+s};
const pc=v=>v>=0?'var(--g)':'var(--r)';

/* ═══════════ 21st.dev: MOUSE-TRACKING SPOTLIGHT ═══════════ */
function initSpotlight(){
  document.addEventListener('mousemove',e=>{
    document.querySelectorAll('.sc,.mc,.ti,.ac,.btn').forEach(el=>{
      const r=el.getBoundingClientRect();
      el.style.setProperty('--mx',(e.clientX-r.left)+'px');
      el.style.setProperty('--my',(e.clientY-r.top)+'px');
    });
  });
}
initSpotlight();

/* ═══════════ 21st.dev: ANIMATED COUNTER ═══════════ */
function animateValue(el,end,duration=800){
  const start=0,startTime=performance.now();
  const isNeg=end<0;
  const absEnd=Math.abs(end);
  const prefix=isNeg?'-$':'$';
  function step(now){
    const elapsed=Math.min((now-startTime)/duration,1);
    const eased=1-Math.pow(1-elapsed,3);
    const current=Math.round(eased*absEnd);
    const formatted=current>=1000?current.toLocaleString('en-US'):current.toString();
    el.textContent=prefix+formatted;
    if(elapsed<1)requestAnimationFrame(step);
    else el.textContent=fmt(end);
  }
  requestAnimationFrame(step);
}

/* ═══════════ API HELPERS ═══════════ */
async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'},credentials:'same-origin'};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(path,opts);
  if(res.status===401){showLogin();throw new Error('Unauthorized')}
  if(!res.ok)throw new Error(await res.text());
  return res.json();
}

/* ═══════════ LOGIN ═══════════ */
function showLogin(){document.getElementById('loginScreen').classList.remove('hidden');document.getElementById('loginPw').focus()}
function hideLogin(){document.getElementById('loginScreen').classList.add('hidden')}
async function doLogin(){
  const pw=document.getElementById('loginPw').value;
  const err=document.getElementById('loginErr');
  if(!pw){err.textContent='Enter a password';return}
  err.innerHTML='<div class="login-spinner"></div>';
  try{
    await api('POST','/api/login',{password:pw});
    err.textContent='';
    hideLogin();
    await loadAndRender();
  }catch(e){
    err.textContent='Wrong password';
    document.getElementById('loginPw').value='';
    document.getElementById('loginPw').focus();
  }
}

/* ═══════════ CLOUD DATA LAYER ═══════════ */
let D={payouts:[],expenses:[],accounts:[]},chartRange='all',bdTab='firm';
let globalTf='all',tfFromDate=null,tfToDate=null;

async function loadAndRender(){
  try{
    D=await api('GET','/api/data');
    renderAll();
  }catch(e){console.error('Load error:',e)}
}
function renderAll(){renderStats();renderChart();renderBreakdown();renderMonthly();renderAccounts();renderTx()}

/* ═══════════ TIMEFRAME FILTER ═══════════ */
function setTf(tf,btn){
  globalTf=tf;
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const cust=document.getElementById('tfCustom');
  if(tf==='custom'){cust.style.display='flex';applyCustomTf();return}
  cust.style.display='none';
  tfFromDate=null;tfToDate=null;
  const now=new Date();
  if(tf==='1w'){tfFromDate=new Date(now);tfFromDate.setDate(now.getDate()-7)}
  else if(tf==='1m'){tfFromDate=new Date(now);tfFromDate.setMonth(now.getMonth()-1)}
  else if(tf==='3m'){tfFromDate=new Date(now);tfFromDate.setMonth(now.getMonth()-3)}
  else if(tf==='6m'){tfFromDate=new Date(now);tfFromDate.setMonth(now.getMonth()-6)}
  else if(tf==='1y'){tfFromDate=new Date(now);tfFromDate.setFullYear(now.getFullYear()-1)}
  updateTfLabel();
  renderAll();
}
function applyCustomTf(){
  const f=document.getElementById('tfFrom').value,t=document.getElementById('tfTo').value;
  tfFromDate=f?new Date(f):null;
  tfToDate=t?new Date(t+'T23:59:59'):null;
  updateTfLabel();
  renderAll();
}
function updateTfLabel(){
  const el=document.getElementById('tfLabel');
  if(globalTf==='all'){el.textContent='Showing all time';return}
  if(globalTf==='custom'){
    const f=tfFromDate?tfFromDate.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'...';
    const t=tfToDate?tfToDate.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'...';
    el.textContent=f+' — '+t;return;
  }
  const labels={'1w':'past 7 days','1m':'past month','3m':'past 3 months','6m':'past 6 months','1y':'past year'};
  el.textContent='Showing '+labels[globalTf];
}
function inTf(dateStr){
  if(globalTf==='all'||!dateStr)return true;
  const d=new Date(dateStr);
  if(tfFromDate&&d<tfFromDate)return false;
  if(tfToDate&&d>tfToDate)return false;
  return true;
}
function filteredPayouts(){return D.payouts.filter(p=>inTf(p.date))}
function filteredExpenses(){return D.expenses.filter(e=>inTf(e.date))}

function fillFirms(){['pFirm','eFirm','aFirm'].forEach(id=>{const s=document.getElementById(id);if(!s)return;s.innerHTML=FIRMS.map(f=>`<option value="${f}">${FF[f]}</option>`).join('')})}
fillFirms();

function switchTab(t,el){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.tc').forEach(x=>x.classList.remove('on'));el.classList.add('on');document.getElementById('tc-'+t).classList.add('on')}

function openM(t){document.getElementById('m-'+t).classList.add('on');const today=new Date().toISOString().slice(0,10);if(t==='payout'){document.getElementById('pDate').value=today;document.getElementById('pAmt').value='';document.getElementById('pAcct').value='';document.getElementById('pNotes').value=''}if(t==='expense'){document.getElementById('eDate').value=today;document.getElementById('eAmt').value='';document.getElementById('eNotes').value=''}if(t==='account'){document.getElementById('aEditId').value='';document.getElementById('aMdTitle').textContent='Add Account';document.getElementById('aDate').value=today;document.getElementById('aName').value='';document.getElementById('aNotes').value=''}}
function closeM(t){document.getElementById('m-'+t).classList.remove('on')}
document.querySelectorAll('.ov').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('on')}));

/* ═══════════ CRUD → API ═══════════ */
async function savePayout(){
  const a=Number(document.getElementById('pAmt').value);if(!a)return alert('Enter amount');
  const p={id:uid(),amount:a,date:document.getElementById('pDate').value,firm:document.getElementById('pFirm').value,account:document.getElementById('pAcct').value,notes:document.getElementById('pNotes').value};
  try{await api('POST','/api/payouts',p);closeM('payout');await loadAndRender()}catch(e){alert('Save failed')}
}
async function saveExpense(){
  const a=Number(document.getElementById('eAmt').value);if(!a)return alert('Enter amount');
  const e={id:uid(),amount:a,date:document.getElementById('eDate').value,type:document.getElementById('eType').value,firm:document.getElementById('eFirm').value,notes:document.getElementById('eNotes').value};
  try{await api('POST','/api/expenses',e);closeM('expense');await loadAndRender()}catch(err){alert('Save failed')}
}
async function saveAccount(){
  const eid=document.getElementById('aEditId').value;
  const ac={id:eid||uid(),name:document.getElementById('aName').value||'Unnamed',firm:document.getElementById('aFirm').value,size:Number(document.getElementById('aSize').value)||50000,status:document.getElementById('aStatus').value,startDate:document.getElementById('aDate').value,notes:document.getElementById('aNotes').value};
  try{await api('POST','/api/accounts',ac);closeM('account');await loadAndRender()}catch(e){alert('Save failed')}
}
function editAcct(id){const a=D.accounts.find(x=>x.id===id);if(!a)return;openM('account');document.getElementById('aEditId').value=a.id;document.getElementById('aMdTitle').textContent='Edit Account';document.getElementById('aName').value=a.name;document.getElementById('aFirm').value=a.firm;document.getElementById('aSize').value=a.size;document.getElementById('aStatus').value=a.status;document.getElementById('aDate').value=a.startDate||'';document.getElementById('aNotes').value=a.notes||''}
async function del(t,id){
  if(!confirm('Delete?'))return;
  try{await api('DELETE','/api/'+t+'/'+id);await loadAndRender()}catch(e){alert('Delete failed')}
}

async function exportAll(){
  try{
    const d=await api('GET','/api/export');
    const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'}),a=document.createElement('a');
    a.href=URL.createObjectURL(b);a.download='soa-roi-backup.json';a.click();
  }catch(e){alert('Export failed')}
}
function importAll(){
  const i=document.createElement('input');i.type='file';i.accept='.json';
  i.onchange=async e=>{
    const r=new FileReader();
    r.onload=async ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(confirm('Replace all data with imported file?')){
          await api('POST','/api/import',{payouts:d.payouts||[],expenses:d.expenses||[],accounts:d.accounts||[]});
          await loadAndRender();
        }
      }catch{alert('Import failed')}
    };
    r.readAsText(e.target.files[0]);
  };
  i.click();
}

/* ═══════════ RENDER ═══════════ */

function renderStats(){
  const fp=filteredPayouts(),fe=filteredExpenses();
  const tp=fp.reduce((s,p)=>s+p.amount,0),te=fe.reduce((s,e)=>s+e.amount,0),np=tp-te,roi=te>0?((tp-te)/te*100):0;
  const ac=D.accounts.filter(a=>a.status!=='blown').length,fc=D.accounts.filter(a=>a.status==='funded').length,ec=D.accounts.filter(a=>a.status==='eval'||a.status==='passed').length;

  document.getElementById('statCards').innerHTML=`
    <div class="sc spring-up" style="animation-delay:0s">
      <div class="sc-label"><span class="pulse-dot" style="background:var(--g)"></span>Funded <span class="pulse-dot" style="background:var(--bl);margin-left:8px"></span>Eval</div>
      <div class="sc-val">${ac}</div>
      <div class="sc-sub">${fc} funded · ${ec} eval</div>
    </div>
    <div class="sc spring-up" style="animation-delay:.05s">
      <div class="sc-label" style="color:var(--r)">Total spent</div>
      <div class="sc-val glow-red" style="color:var(--r)" data-counter="${te}">${fmt(te)}</div>
      <div class="sc-sub">Evaluation fees & resets</div>
    </div>
    <div class="sc spring-up" style="animation-delay:.1s">
      <div class="sc-label" style="color:var(--g)">Total earned</div>
      <div class="sc-val glow-green" data-counter="${tp}">${fmt(tp)}</div>
      <div class="sc-sub">Payouts received</div>
    </div>
    <div class="sc sc-hero spring-up" style="animation-delay:.15s">
      <div class="sc-label">Net total</div>
      <div class="sc-val ${np>=0?'glow-green':'glow-red'}" style="color:${pc(np)}" data-counter="${np}">${fmt(np)}</div>
      <div class="sc-sub" style="color:${pc(roi)}">${roi>0?'+':''}${roi.toFixed(0)}% ROI</div>
    </div>`;

  // Animate counters
  document.querySelectorAll('[data-counter]').forEach(el=>{
    const val=Number(el.dataset.counter);
    if(val!==0)animateValue(el,val);
  });
}

/* ═══════════ SVG LINE CHART ═══════════ */
function renderChart(){
  const fp=filteredPayouts(),fe=filteredExpenses();
  const events=[];
  fp.forEach(p=>events.push({date:p.date,amt:p.amount}));
  fe.forEach(e=>events.push({date:e.date,amt:-e.amount}));
  events.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  let cum=0,cumIn=0,cumEx=0;
  let pts=events.map(e=>{cum+=e.amt;if(e.amt>0)cumIn+=e.amt;else cumEx+=Math.abs(e.amt);return{date:e.date,roi:cum,income:cumIn,expenses:cumEx}});

  const W=700,H=280,pad={t:20,r:20,b:40,l:55};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  let svg=`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px"><div><div class="card-title">ROI Progression</div><div class="card-sub">Cumulative net return over time</div></div><div style="display:flex;gap:4px">`;
  ['1w','1m','all'].forEach(r=>{svg+=`<button class="rbtn ${chartRange===r?'on':''}" onclick="chartRange='${r}';renderChart()">${r==='all'?'ALL':r.toUpperCase()}</button>`});
  svg+=`</div></div>`;

  if(!pts.length){svg+=`<div class="empty">Log payouts and expenses to see your progression</div>`;document.getElementById('chartCard').innerHTML=svg;return}

  const allVals=[...pts.map(p=>p.income),...pts.map(p=>p.roi),...pts.map(p=>p.expenses)];
  const maxV=Math.max(...allVals,1),minV=Math.min(0,...allVals);
  const range=maxV-minV||1;
  const x=i=>pad.l+(i/(pts.length-1||1))*cw;
  const y=v=>pad.t+ch-(((v-minV)/range)*ch);

  const mkPath=(key,close)=>{let d=pts.map((p,i)=>`${i?'L':'M'}${x(i).toFixed(1)} ${y(p[key]).toFixed(1)}`).join(' ');if(close)d+=` L${x(pts.length-1).toFixed(1)} ${y(0).toFixed(1)} L${x(0).toFixed(1)} ${y(0).toFixed(1)} Z`;return d};

  svg+=`<svg viewBox="0 0 ${W} ${H}" class="chart-svg">`;
  // Glow defs
  svg+=`<defs>
    <filter id="glow-g"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-b"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00e676" stop-opacity="0.2"/><stop offset="100%" stop-color="#00e676" stop-opacity="0"/></linearGradient>
  </defs>`;
  // Grid lines
  for(let i=0;i<=4;i++){const yy=pad.t+(ch/4)*i;const val=maxV-((maxV-minV)/4)*i;svg+=`<line x1="${pad.l}" y1="${yy}" x2="${W-pad.r}" y2="${yy}" stroke="rgba(255,255,255,0.03)" stroke-dasharray="3,3"/><text x="${pad.l-8}" y="${yy+4}" text-anchor="end" fill="#4e4e68" font-size="10" font-family="'DM Mono',monospace">${val>=1000?(val/1000).toFixed(0)+'k':val.toFixed(0)}</text>`}
  // X labels
  const step=Math.max(1,Math.floor(pts.length/8));
  pts.forEach((p,i)=>{if(i%step===0||i===pts.length-1){const d=new Date(p.date);svg+=`<text x="${x(i)}" y="${H-5}" text-anchor="middle" fill="#4e4e68" font-size="9" font-family="'DM Mono',monospace">${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</text>`}});
  // Area fill with gradient
  svg+=`<path d="${mkPath('income',true)}" fill="url(#areaGrad)"/>`;
  // Lines with glow
  svg+=`<path d="${mkPath('income')}" stroke="#00e676" class="chart-line" filter="url(#glow-g)"/>`;
  svg+=`<path d="${mkPath('roi')}" stroke="#448aff" class="chart-line" stroke-dasharray="4,4" filter="url(#glow-b)"/>`;
  svg+=`<path d="${mkPath('expenses')}" stroke="#ff3d57" class="chart-line" stroke-width="1.5"/>`;
  // Endpoint dots with glow
  if(pts.length>0){
    const lastI=pts.length-1;
    svg+=`<circle cx="${x(lastI)}" cy="${y(pts[lastI].income)}" r="4" fill="#00e676" filter="url(#glow-g)"><animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/></circle>`;
    svg+=`<circle cx="${x(lastI)}" cy="${y(pts[lastI].roi)}" r="4" fill="#448aff" filter="url(#glow-b)"><animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/></circle>`;
  }
  svg+=`</svg>`;
  svg+=`<div style="display:flex;justify-content:center;gap:24px;margin-top:10px;font-size:11px;color:var(--t3)"><span style="display:flex;align-items:center;gap:6px"><span style="width:14px;height:2px;background:#00e676;border-radius:1px;box-shadow:0 0 6px rgba(0,230,118,0.5)"></span>Income</span><span style="display:flex;align-items:center;gap:6px"><span style="width:14px;height:2px;background:#448aff;border-radius:1px;box-shadow:0 0 6px rgba(68,138,255,0.5)"></span>Net ROI</span><span style="display:flex;align-items:center;gap:6px"><span style="width:14px;height:2px;background:#ff3d57;border-radius:1px;box-shadow:0 0 6px rgba(255,61,87,0.5)"></span>Expenses</span></div>`;
  document.getElementById('chartCard').innerHTML=svg;
}

/* ═══════════ DONUT BREAKDOWN ═══════════ */
function renderBreakdown(){
  let html=`<div class="card-title" style="margin-bottom:12px">Finance breakdown</div><div class="stabs">`;
  [['firm','By firm'],['size','By account size'],['expenses','Expenses']].forEach(([k,l])=>{html+=`<button class="stab ${bdTab===k?'on':''}" onclick="bdTab='${k}';renderBreakdown()">${l}</button>`});
  html+=`</div>`;

  let items=[];
  const fp=filteredPayouts(),fe=filteredExpenses();
  if(bdTab==='firm'){const m={};fp.forEach(p=>{if(!m[p.firm])m[p.firm]={e:0,s:0};m[p.firm].e+=p.amount});fe.forEach(e=>{if(!m[e.firm])m[e.firm]={e:0,s:0};m[e.firm].s+=e.amount});items=Object.entries(m).map(([k,v],i)=>({name:FF[k]||k,value:v.e-v.s,color:DC[i%DC.length]})).sort((a,b)=>b.value-a.value)}
  if(bdTab==='size'){const m={};D.accounts.forEach(a=>{const s=fmt(a.size);if(!m[s])m[s]=0;m[s]++});items=Object.entries(m).map(([k,v],i)=>({name:k,value:v,color:DC[i%DC.length]}))}
  if(bdTab==='expenses'){const m={};fe.forEach(e=>{const t=ET[e.type]||e.type;if(!m[t])m[t]=0;m[t]+=e.amount});items=Object.entries(m).map(([k,v],i)=>({name:k,value:v,color:DC[i%DC.length]})).sort((a,b)=>b.value-a.value)}

  const total=items.reduce((s,d)=>s+Math.abs(d.value),0);
  const sz=180,sk=22,r=(sz-sk)/2,circ=2*Math.PI*r;
  let off=0;
  html+=`<div style="display:flex;flex-direction:column;align-items:center"><svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}">`;
  // Glow filter for donut
  html+=`<defs><filter id="donut-glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`;
  html+=`<circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="${sk}"/>`;
  items.forEach(d=>{const pct=total>0?Math.abs(d.value)/total:0;const dash=pct*circ;html+=`<circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${d.color}" stroke-width="${sk}" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-off}" transform="rotate(-90 ${sz/2} ${sz/2})" filter="url(#donut-glow)" style="transition:all .6s cubic-bezier(.4,0,.2,1)"/>`;off+=dash});
  html+=`<text x="${sz/2}" y="${sz/2-8}" text-anchor="middle" fill="#8585a0" font-size="11" font-family="'DM Mono',monospace">${bdTab==='expenses'?'Total expenses':'Net by firm'}</text><text x="${sz/2}" y="${sz/2+12}" text-anchor="middle" fill="#e4e4ed" font-size="16" font-weight="600" font-family="'DM Mono',monospace">${fmt(total)}</text></svg></div>`;
  html+=`<div style="margin-top:16px;display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto">`;
  items.forEach(d=>{html+=`<div class="dl"><div style="display:flex;align-items:center;gap:8px"><div class="dl-dot" style="background:${d.color};color:${d.color}"></div><span style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.name}</span></div><span style="font-family:var(--mono);font-weight:500;color:${d.value>=0?'var(--g)':'var(--r)'}">${d.value>=0?'+':''}${fmt(d.value)}</span></div>`});
  html+=`</div>`;
  document.getElementById('breakdownCard').innerHTML=html;
}

/* ═══════════ MONTHLY ═══════════ */
function renderMonthly(){
  const fp=filteredPayouts(),fe=filteredExpenses();
  const all={};
  fp.forEach(p=>{if(!p.date)return;const ym=p.date.slice(0,7);if(!all[ym])all[ym]={p:0,e:0};all[ym].p+=p.amount});
  fe.forEach(e=>{if(!e.date)return;const ym=e.date.slice(0,7);if(!all[ym])all[ym]={p:0,e:0};all[ym].e+=e.amount});
  const sorted=Object.keys(all).sort((a,b)=>b.localeCompare(a));
  if(!sorted.length){document.getElementById('monthlyList').innerHTML='<div class="empty">Log payouts and expenses to see monthly data</div>';return}
  let cum=0;const rows=[];[...sorted].reverse().forEach(ym=>{const m=all[ym],pr=m.p-m.e;cum+=pr;rows.push({ym,...m,pr,cum})});rows.reverse();
  const bm=Math.max(...rows.map(r=>Math.max(r.p,r.e,1)));
  document.getElementById('monthlyList').innerHTML=rows.map((r,i)=>{
    const[y,mo]=r.ym.split('-'),nm=new Date(y,parseInt(mo)-1).toLocaleString('en-US',{month:'long',year:'numeric'}),roi=r.e>0?r.p/r.e:null;
    return`<div class="mc" style="animation-delay:${i*50}ms;border-left:3px solid ${r.pr>=0?'var(--g)':'var(--r)'}"><div class="mc-top"><span class="mc-name">${nm}</span><div style="display:flex;align-items:center;gap:12px"><span class="mc-profit ${r.pr>=0?'glow-green':'glow-red'}" style="color:${pc(r.pr)}">${fmt(r.pr)}</span>${roi!==null?`<span class="roi-badge" style="background:${roi>=1?'var(--gbg)':'var(--rbg)'};border:1px solid ${roi>=1?'var(--gb)':'var(--rb)'};color:${roi>=1?'var(--g)':'var(--r)'}">${roi.toFixed(2)}x</span>`:''}</div></div><div class="mc-grid"><div class="mc-cell"><div class="mc-cv" style="color:var(--r)">${r.e?fmt(r.e):'—'}</div><div class="mc-cl">Expenses</div></div><div class="mc-cell"><div class="mc-cv" style="color:var(--g)">${r.p?fmt(r.p):'—'}</div><div class="mc-cl">Payouts</div></div><div class="mc-cell"><div class="mc-cv" style="color:${pc(r.pr)}">${fmt(r.pr)}</div><div class="mc-cl">Profit</div></div></div>${(r.e>0||r.p>0)?`<div class="mc-bar">${r.e>0?`<div class="progress-animated" style="width:${(r.e/bm)*100}%;background:var(--r);border-radius:2px"></div>`:''}${r.p>0?`<div class="progress-animated" style="width:${(r.p/bm)*100}%;background:var(--g);border-radius:2px"></div>`:''}</div>`:''}<div class="mc-cum">Cumulative: <span style="color:${pc(r.cum)}">${fmt(r.cum)}</span></div></div>`;
  }).join('');
}

/* ═══════════ ACCOUNTS ═══════════ */
function renderAccounts(){
  const active=D.accounts.filter(a=>a.status!=='blown'),blown=D.accounts.filter(a=>a.status==='blown');
  const ac=document.getElementById('acctActive'),bc=document.getElementById('acctBlown'),bs=document.getElementById('blownSec');
  if(!active.length&&!blown.length){ac.innerHTML='<div class="empty" style="grid-column:1/-1">No accounts yet — add your first account to get started</div>';bs.style.display='none';return}
  ac.innerHTML=active.length?active.map((a,i)=>`<div class="ac" style="animation-delay:${i*50}ms;border-left:3px solid ${SC[a.status]}"><div class="ac-del"><button class="btn btn-sm" onclick="editAcct('${a.id}')" data-tip="Edit">&#9998;</button> <button class="btn btn-sm btn-r" onclick="del('accounts','${a.id}')" data-tip="Delete">&#10005;</button></div><div class="ac-name">${a.name}<span class="ac-badge" style="background:${SC[a.status]}15;color:${SC[a.status]};box-shadow:0 0 10px ${SC[a.status]}20">${SL[a.status]}</span></div><div class="ac-firm">${FF[a.firm]||a.firm}</div><div class="ac-meta"><div><div class="ac-mv">${fmt(a.size)}</div><div class="ac-ml">Size</div></div><div><div class="ac-mv">${a.startDate||'—'}</div><div class="ac-ml">Started</div></div></div>${a.notes?`<div style="font-size:11px;color:var(--t2);margin-top:8px">${a.notes}</div>`:''}</div>`).join(''):'<div class="empty" style="grid-column:1/-1">No active accounts</div>';
  if(blown.length){bs.style.display='block';bc.innerHTML=blown.map((a,i)=>`<div class="ac" style="animation-delay:${i*50}ms;opacity:.5;border-left:3px solid var(--r)"><div class="ac-del"><button class="btn btn-sm" onclick="editAcct('${a.id}')">&#9998;</button> <button class="btn btn-sm btn-r" onclick="del('accounts','${a.id}')">&#10005;</button></div><div class="ac-name">${a.name}<span class="ac-badge" style="background:var(--rbg);color:var(--r)">BLOWN</span></div><div class="ac-firm">${FF[a.firm]||a.firm} · ${fmt(a.size)}</div></div>`).join('')}else bs.style.display='none';
}

/* ═══════════ TRANSACTIONS ═══════════ */
function renderTx(){
  const all=[...filteredPayouts().map(p=>({...p,_t:'payout'})),...filteredExpenses().map(e=>({...e,_t:'expense'}))].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  if(!all.length){document.getElementById('txList').innerHTML='<div class="empty">No transactions yet — log a payout or expense to get started</div>';return}
  document.getElementById('txList').innerHTML=all.map((t,i)=>`<div class="ti" style="animation-delay:${i*35}ms;border-left:3px solid ${t._t==='payout'?'var(--g)':'var(--r)'}"><div><div style="font-weight:600">${t._t==='payout'?(t.account||t.firm):`${t.firm} — ${ET[t.type]||t.type}`}</div><div style="font-size:11px;color:var(--t3)">${t.notes||''}</div></div><div><div class="ti-lbl">Amount</div><div class="ti-val ${t._t==='payout'?'glow-green':'glow-red'}" style="color:${t._t==='payout'?'var(--g)':'var(--r)'}">${t._t==='payout'?'+':'-'}${fmt(t.amount)}</div></div><div><div class="ti-lbl">Date</div><div class="ti-val">${t.date||'—'}</div></div><div><div class="ti-lbl">Type</div><div class="ti-val">${t._t==='payout'?'Payout':'Expense'}</div></div><button class="btn btn-sm btn-r" onclick="del('${t._t==='payout'?'payouts':'expenses'}','${t.id}')">&#10005;</button></div>`).join('');
}

(async function init(){
  try{
    await api('GET','/api/check');
    hideLogin();
    await loadAndRender();
  }catch(e){
    showLogin();
  }
})();
