<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOA · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080c;--bg2:#0f0f15;--bg3:#15151e;
  --brd:#1e1e2c;
  --t:#e4e4ed;--t2:#8585a0;--t3:#4e4e68;
  --g:#00e676;--accent:#c8a96e;
  --glass-bg:rgba(15,15,21,0.55);--glass-brd:rgba(255,255,255,0.06);
  --sans:'Montserrat',sans-serif;--rad:14px;
}
html,body{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--t);display:flex;align-items:center;justify-content:center;overflow:hidden}

/* Background */
.gradient-mesh{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.gradient-mesh .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.4;will-change:transform}
.gradient-mesh .orb-1{width:600px;height:600px;background:radial-gradient(circle,rgba(0,230,118,0.1),transparent 70%);top:-10%;left:-5%;animation:orbFloat1 25s ease-in-out infinite}
.gradient-mesh .orb-2{width:500px;height:500px;background:radial-gradient(circle,rgba(200,169,110,0.08),transparent 70%);bottom:-10%;right:-5%;animation:orbFloat2 30s ease-in-out infinite}
@keyframes orbFloat1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(60px,80px) scale(1.05)}}
@keyframes orbFloat2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-50px,-60px) scale(1.08)}}

.dot-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(rgba(255,255,255,0.03) 1px,transparent 1px);background-size:28px 28px}
.noise-overlay{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.035;mix-blend-mode:overlay}
.noise-overlay::after{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");background-repeat:repeat;background-size:128px 128px}

/* Main content */
.landing{position:relative;z-index:2;text-align:center;max-width:700px;padding:24px}
.landing h1{font-size:32px;font-weight:800;margin-bottom:6px;background:linear-gradient(135deg,#e4e4ed 0%,#8585a0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.landing p{font-size:14px;color:var(--t3);margin-bottom:40px}

.cards{display:grid;grid-template-columns:1fr 1fr;gap:20px}

.pick-card{
  background:var(--glass-bg);
  backdrop-filter:blur(16px);
  border:1px solid var(--glass-brd);
  border-radius:var(--rad);
  padding:36px 28px;
  text-decoration:none;
  color:var(--t);
  position:relative;
  overflow:hidden;
  transition:all .3s cubic-bezier(.4,0,.2,1);
  cursor:pointer;
}
.pick-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.4)}
.pick-card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--card-accent),transparent);opacity:.4}
.pick-card::after{
  content:'';position:absolute;inset:0;border-radius:var(--rad);
  background:radial-gradient(300px circle at var(--mx,50%) var(--my,50%),var(--card-glow),transparent 60%);
  pointer-events:none;opacity:0;transition:opacity .3s;
}
.pick-card:hover::after{opacity:1}
.pick-card:hover{border-color:var(--card-accent)}

.pick-card.funded{--card-accent:var(--g);--card-glow:rgba(0,230,118,0.04)}
.pick-card.business{--card-accent:var(--accent);--card-glow:rgba(200,169,110,0.04)}

.pick-icon{font-size:40px;margin-bottom:16px;display:block}
.pick-title{font-size:18px;font-weight:700;margin-bottom:6px}
.pick-desc{font-size:12px;color:var(--t3);line-height:1.6}
.pick-arrow{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:16px;font-size:12px;font-weight:600;
  color:var(--card-accent);opacity:.6;transition:opacity .2s;
}
.pick-card:hover .pick-arrow{opacity:1}

@media(max-width:600px){.cards{grid-template-columns:1fr}.landing h1{font-size:24px}}

@keyframes springUp{0%{opacity:0;transform:translateY(20px) scale(.97)}60%{transform:translateY(-3px) scale(1.005)}100%{opacity:1;transform:translateY(0) scale(1)}}
.spring-up{animation:springUp .5s cubic-bezier(.4,0,.2,1) both}
</style>
</head>
<body>

<div class="gradient-mesh">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>
<div class="dot-grid"></div>
<div class="noise-overlay"></div>

<div class="landing">
  <h1 class="spring-up">Welcome back, Sean</h1>
  <p class="spring-up" style="animation-delay:.05s">Choose a tracker to get started</p>

  <div class="cards">
    <a href="/funded.html" class="pick-card funded spring-up" style="animation-delay:.1s">
      <span class="pick-icon">&#9889;</span>
      <div class="pick-title">Funded Tracker</div>
      <div class="pick-desc">Track your prop firm accounts, payouts, expenses, and overall funded trading ROI.</div>
      <div class="pick-arrow">Open tracker &#8594;</div>
    </a>

    <a href="/business.html" class="pick-card business spring-up" style="animation-delay:.15s">
      <span class="pick-icon">&#9879;</span>
      <div class="pick-title">Business Tracker</div>
      <div class="pick-desc">Monitor revenue streams, team payroll, software costs, and monthly profit across your business.</div>
      <div class="pick-arrow">Open tracker &#8594;</div>
    </a>
  </div>
</div>

<script>
document.addEventListener('mousemove',e=>{
  document.querySelectorAll('.pick-card').forEach(el=>{
    const r=el.getBoundingClientRect();
    el.style.setProperty('--mx',(e.clientX-r.left)+'px');
    el.style.setProperty('--my',(e.clientY-r.top)+'px');
  });
});
</script>
</body>
</html>
